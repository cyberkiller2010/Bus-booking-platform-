<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Bus Platform</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:system-ui;background:#2c3e50;padding:1rem;}
        .container{max-width:1200px;margin:0 auto;}
        .card{background:white;border-radius:20px;padding:1.5rem;margin-bottom:1rem;}
        input,button{width:100%;padding:10px;margin:5px 0;border-radius:12px;border:1px solid #ccc;}
        button{background:#e67e22;color:white;border:none;cursor:pointer;font-weight:bold;}
        table{width:100%;border-collapse:collapse;margin-top:1rem;}
        th,td{border:1px solid #ddd;padding:8px;text-align:left;}
        th{background:#34495e;color:white;}
        .suspend{background:#e74c3c;color:white;border:none;padding:5px 10px;border-radius:8px;cursor:pointer;}
        .logout{background:#e67e22;margin-bottom:1rem;}
    </style>
</head>
<body>
<div class="container">
    <div id="adminLogin" class="card">
        <h2>Admin Login</h2>
        <input type="text" id="adminUser" placeholder="Username">
        <input type="password" id="adminPass" placeholder="Password">
        <button onclick="adminLogin()">Login</button>
        <p>Demo: admin / admin123</p>
    </div>

    <div id="adminDashboard" style="display:none;">
        <div class="card">
            <h2>🛠️ Admin Dashboard <button class="logout" onclick="adminLogout()">Logout</button></h2>
            <h3>➕ Add New Bus (any company)</h3>
            <input type="text" id="newBusCompany" placeholder="Company name">
            <input type="text" id="newBusFrom" placeholder="From">
            <input type="text" id="newBusTo" placeholder="To">
            <input type="time" id="newBusDeparture">
            <input type="text" id="newBusDuration" placeholder="Duration (e.g., 5h)">
            <input type="number" id="newBusPrice" placeholder="Price per seat">
            <input type="number" id="newBusSeats" placeholder="Total seats">
            <button onclick="adminAddBus()">Add Bus</button>
        </div>

        <div class="card">
            <h3>🚌 All Buses (suspend / activate)</h3>
            <table id="allBusesTable">
                <thead><tr><th>ID</th><th>Company</th><th>Route</th><th>Price</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="busesTbody"></tbody>
            </table>
        </div>

        <div class="card">
            <h3>💰 Company Subscriptions (monthly fee)</h3>
            <table id="paymentsTable">
                <thead><tr><th>Company</th><th>Monthly Fee Paid?</th><th>Last Payment</th><th>Action</th></tr></thead>
                <tbody id="paymentsTbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Initialize default data if not exists
    if (!localStorage.getItem('company_buses')) {
        let defaultBuses = [
            { id: 1, company: "Royal Express", from: "Lusaka", to: "Livingstone", departure: "08:00", duration: "7h", price: 45, seats: 40, available: 40, suspended: false },
            { id: 2, company: "Royal Express", from: "Lusaka", to: "Chipata", departure: "14:00", duration: "8h", price: 60, seats: 45, available: 45, suspended: false },
            { id: 3, company: "Mazhandu", from: "Lusaka", to: "Livingstone", departure: "14:00", duration: "6h 30m", price: 55, seats: 50, available: 50, suspended: false }
        ];
        localStorage.setItem('company_buses', JSON.stringify(defaultBuses));
    }
    if (!localStorage.getItem('customer_bookings')) {
        localStorage.setItem('customer_bookings', JSON.stringify([]));
    }

    function adminLogin() {
        let u = document.getElementById('adminUser').value;
        let p = document.getElementById('adminPass').value;
        if (u === "admin" && p === "admin123") {
            document.getElementById('adminLogin').style.display = 'none';
            document.getElementById('adminDashboard').style.display = 'block';
            loadAllBuses();
            loadCompaniesPaymentStatus();
        } else { alert("Invalid credentials"); }
    }

    function loadAllBuses() {
        let buses = JSON.parse(localStorage.getItem('company_buses') || '[]');
        let tbody = document.getElementById('busesTbody');
        if (buses.length === 0) { tbody.innerHTML = '<tr><td colspan="6">No buses found</td></tr>'; return; }
        let rows = '';
        buses.forEach(b => {
            let status = b.suspended ? "Suspended" : "Active";
            rows += `<tr>
                <td>${b.id}</td>
                <td>${b.company}</td>
                <td>${b.from} → ${b.to}</td>
                <td>$${b.price}</td>
                <td>${status}</td>
                <td><button class="suspend" onclick="toggleSuspend(${b.id})">${b.suspended ? 'Activate' : 'Suspend'}</button></td>
            </tr>`;
        });
        tbody.innerHTML = rows;
    }

    function toggleSuspend(busId) {
        let buses = JSON.parse(localStorage.getItem('company_buses'));
        let bus = buses.find(b => b.id === busId);
        bus.suspended = !bus.suspended;
        localStorage.setItem('company_buses', JSON.stringify(buses));
        loadAllBuses();
    }

    function adminAddBus() {
        let company = document.getElementById('newBusCompany').value.trim();
        let from = document.getElementById('newBusFrom').value.trim();
        let to = document.getElementById('newBusTo').value.trim();
        let departure = document.getElementById('newBusDeparture').value;
        let duration = document.getElementById('newBusDuration').value.trim();
        let price = parseInt(document.getElementById('newBusPrice').value);
        let seats = parseInt(document.getElementById('newBusSeats').value);
        if (!company || !from || !to || !price || !seats) { alert("Fill all required fields"); return; }
        let buses = JSON.parse(localStorage.getItem('company_buses') || '[]');
        let newId = Date.now();
        buses.push({
            id: newId,
            company, from, to, departure, duration, price, seats, available: seats, suspended: false
        });
        localStorage.setItem('company_buses', JSON.stringify(buses));
        alert("Bus added successfully");
        loadAllBuses();
        // Clear form
        document.getElementById('newBusCompany').value = '';
        document.getElementById('newBusFrom').value = '';
        document.getElementById('newBusTo').value = '';
        document.getElementById('newBusDeparture').value = '';
        document.getElementById('newBusDuration').value = '';
        document.getElementById('newBusPrice').value = '';
        document.getElementById('newBusSeats').value = '';
    }

    function loadCompaniesPaymentStatus() {
        let buses = JSON.parse(localStorage.getItem('company_buses') || '[]');
        let companies = [...new Map(buses.map(b => [b.company, b.company])).values()];
        let tbody = document.getElementById('paymentsTbody');
        if (companies.length === 0) { tbody.innerHTML = '<tr><td colspan="4">No companies</td></tr>'; return; }
        let rows = '';
        companies.forEach(comp => {
            let paid = localStorage.getItem(`sub_${comp}`) === 'true' ? "Yes" : "No";
            let lastPayment = paid === 'Yes' ? (localStorage.getItem(`sub_date_${comp}`) || '2025-06-01') : 'Never';
            rows += `<tr>
                <td>${comp}</td>
                <td>${paid}</td>
                <td>${lastPayment}</td>
                <td><button onclick="markPaid('${comp}')">✅ Mark Paid (mock)</button></td>
            </tr>`;
        });
        tbody.innerHTML = rows;
    }

    function markPaid(company) {
        localStorage.setItem(`sub_${company}`, 'true');
        let today = new Date().toISOString().split('T')[0];
        localStorage.setItem(`sub_date_${company}`, today);
        loadCompaniesPaymentStatus();
        alert(`Monthly fee marked as paid for ${company}`);
    }

    function adminLogout() {
        document.getElementById('adminLogin').style.display = 'block';
        document.getElementById('adminDashboard').style.display = 'none';
    }
</script>
</body>
</html>
